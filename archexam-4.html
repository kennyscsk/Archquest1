        const chunkSize = 10; // Número de preguntas por pantalla
        let currentChunk = 0;
        let score = 0;
        let userAnswers = []; // Almacena las respuestas del usuario (array de arrays)

        const chunkTitle = document.getElementById('chunk-title');
        const questionsContainer = document.getElementById('questions-container');
        const nextButton = document.getElementById('next-btn');
        const resultContainer = document.getElementById('result');

        // Función para dividir preguntas en chunks
        function getChunk(startIndex) {
            return questions.slice(startIndex, startIndex + chunkSize);
        }

        // Función para mostrar el chunk actual
        function loadChunk() {
            const chunk = getChunk(currentChunk * chunkSize);
            const chunkNumber = currentChunk + 1;
            const totalChunks = Math.ceil(questions.length / chunkSize);
            chunkTitle.textContent = `Sección ${chunkNumber} de ${totalChunks} - Preguntas ${currentChunk * chunkSize + 1} a ${Math.min((currentChunk + 1) * chunkSize, questions.length)}`;
            questionsContainer.innerHTML = '';

            chunk.forEach((q, chunkIndex) => {
                const questionIndex = currentChunk * chunkSize + chunkIndex;
                const questionDiv = document.createElement('div');
                questionDiv.className = 'border border-gray-300 rounded-lg p-4 bg-gray-50 shadow-sm';
                questionDiv.innerHTML = `
                    <h2 class="text-xl font-semibold text-gray-800 mb-3">Pregunta ${questionIndex + 1}: ${q.question}</h2>
                    <div class="space-y-2 ml-4">
                `;

                const optionsContainer = document.createElement('div');
                optionsContainer.className = 'space-y-2';
                q.options.forEach((option) => {
                    const label = document.createElement('label');
                    label.className = 'block p-3 bg-white rounded-lg hover:bg-gray-100 transition duration-150 cursor-pointer';
                    label.innerHTML = `
                        <input type="checkbox" name="option-${questionIndex}" value="${option}" class="mr-3 h-5 w-5 text-blue-600">
                        <span class="text-gray-700">${option}</span>
                    `;
                    optionsContainer.appendChild(label);
                });

                questionDiv.appendChild(optionsContainer);
                questionDiv.innerHTML += '</div>';
                questionsContainer.appendChild(questionDiv);
            });

            // Habilitar el botón solo si hay al menos una selección en el chunk
            nextButton.disabled = true;
            updateButtonState();
        }

        // Función para actualizar el estado del botón
        function updateButtonState() {
            let hasSelections = false;
            for (let i = currentChunk * chunkSize; i < Math.min((currentChunk + 1) * chunkSize, questions.length); i++) {
                const checkedBoxes = document.querySelectorAll(`input[name="option-${i}"]:checked`);
                if (checkedBoxes.length > 0) {
                    hasSelections = true;
                    break;
                }
            }
            nextButton.disabled = !hasSelections;
        }

        // Función para verificar respuestas
        function checkAnswers(selectedOptions, correctOptions) {
            if (selectedOptions.length !== correctOptions.length) return false;
            return selectedOptions.every(opt => correctOptions.includes(opt)) &&
                   correctOptions.every(opt => selectedOptions.includes(opt));
        }

        // Manejar el botón Siguiente
        nextButton.addEventListener('click', () => {
            const chunk = getChunk(currentChunk * chunkSize);
            chunk.forEach((q, chunkIndex) => {
                const questionIndex = currentChunk * chunkSize + chunkIndex;
                const selectedOptions = Array.from(document.querySelectorAll(`input[name="option-${questionIndex}"]:checked`))
                                            .map(input => input.value);
                userAnswers[questionIndex] = selectedOptions;
                if (checkAnswers(selectedOptions, q.correct)) {
                    score++;
                }
            });

            currentChunk++;
            if (currentChunk * chunkSize < questions.length) {
                loadChunk();
            } else {
                showResult();
            }
        });

        // Listener para cambios en checkboxes
        document.addEventListener('change', (e) => {
            if (e.target.type === 'checkbox' && e.target.name.startsWith('option-')) {
                updateButtonState();
            }
        });

        // Mostrar resultados
        function showResult() {
            const percentage = (score / questions.length) * 100;
            chunkTitle.classList.add('hidden');
            questionsContainer.classList.add('hidden');
            nextButton.classList.add('hidden');
            resultContainer.classList.remove('hidden');

            let resultHTML = `
                <h2 class="text-2xl font-bold text-gray-800 mb-4">¡Examen Completado!</h2>
                <p class="text-lg text-gray-700">Respondiste correctamente ${score} de ${questions.length} preguntas.</p>
                <p class="text-lg text-gray-700 mb-6">Porcentaje: ${percentage.toFixed(2)}%</p>
                <h3 class="text-xl font-semibold text-gray-800 mb-4">Resumen de Respuestas:</h3>
                <ul class="space-y-6">
            `;

            questions.forEach((q, index) => {
                const isCorrect = checkAnswers(userAnswers[index] || [], q.correct);
                resultHTML += `
                    <li class="p-4 bg-gray-50 rounded-lg border ${isCorrect ? 'border-green-300' : 'border-red-300'}">
                        <p class="text-lg font-semibold text-gray-800">Pregunta ${index + 1}: ${q.question}</p>
                        <p class="text-gray-600">Tus respuestas: ${userAnswers[index]?.join(", ") || "Ninguna seleccionada"}</p>
                        <p class="text-gray-600">Respuestas correctas: ${q.correct.join(", ")}</p>
                        <p class="text-${isCorrect ? 'green' : 'red'}-600 font-medium">${isCorrect ? 'Correcto' : 'Incorrecto'}</p>
                        ${!isCorrect ? `<p class="text-gray-600 mt-2">${q.explanation}</p>` : ''}
                    </li>
                `;
            });

            resultHTML += '</ul>';
            resultContainer.innerHTML = resultHTML;
        }

        // Iniciar
        loadChunk();
    </script>
